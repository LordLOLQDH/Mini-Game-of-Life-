<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game of Life</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}

canvas {
    display: block;
    touch-action: none;
}

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
}

button {
    padding: 10px 15px;
    margin-right: 5px;
    border: none;
    border-radius: 10px;
    background: #222;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div id="ui">
    <button id="startBtn">Start</button>
    <button id="clearBtn">Clear</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

resize();

window.addEventListener("resize", resize);

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

const cellSize = 12;

let cols = Math.floor(canvas.width / cellSize);
let rows = Math.floor(canvas.height / cellSize);

let grid = createGrid();

function createGrid() {
    return Array.from({ length: rows }, () =>
        Array(cols).fill(0)
    );
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {

            if (grid[y][x]) {
                ctx.fillStyle = "lime";
                ctx.fillRect(
                    x * cellSize,
                    y * cellSize,
                    cellSize - 1,
                    cellSize - 1
                );
            }
        }
    }
}

function update() {
    let newGrid = createGrid();

    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {

            let neighbors = 0;

            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {

                    if (dx === 0 && dy === 0) continue;

                    let nx = x + dx;
                    let ny = y + dy;

                    if (
                        nx >= 0 &&
                        ny >= 0 &&
                        nx < cols &&
                        ny < rows
                    ) {
                        neighbors += grid[ny][nx];
                    }
                }
            }

            if (grid[y][x]) {
                newGrid[y][x] =
                    neighbors === 2 || neighbors === 3 ? 1 : 0;
            } else {
                newGrid[y][x] =
                    neighbors === 3 ? 1 : 0;
            }
        }
    }

    grid = newGrid;
}

function loop() {
    if (running) {
        update();
    }

    draw();

    requestAnimationFrame(loop);
}

let running = false;

document.getElementById("startBtn").onclick = () => {
    running = !running;
};

document.getElementById("clearBtn").onclick = () => {
    grid = createGrid();
};

canvas.addEventListener("touchstart", handleTouch);
canvas.addEventListener("touchmove", handleTouch);

function handleTouch(e) {
    e.preventDefault();

    for (let touch of e.touches) {

        let rect = canvas.getBoundingClientRect();

        let x = Math.floor(
            (touch.clientX - rect.left) / cellSize
        );

        let y = Math.floor(
            (touch.clientY - rect.top) / cellSize
        );

        if (
            x >= 0 &&
            y >= 0 &&
            x < cols &&
            y < rows
        ) {
            grid[y][x] = 1;
        }
    }
}

loop();
</script>

</body>
</html>
